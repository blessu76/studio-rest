name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 한 번에 하나의 배포만 진행 (중간 실행은 취소)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site (repo root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify Slack — success
        if: success() && env.SLACK_BOT_TOKEN != ''
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"C0BF8THTL7L\",
              \"text\": \"✅ *studio.ipe.rest 배포 완료*\n_보고: Paul (Head of Reach) → #studio_\n\n• 커밋: \`${COMMIT_MSG}\`\n• URL: https://studio.ipe.rest\",
              \"mrkdwn\": true
            }"

      - name: Notify Slack — failure
        if: failure() && env.SLACK_BOT_TOKEN != ''
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"C0BF8THTL7L\",
              \"text\": \"❌ *studio.ipe.rest 배포 실패 — 즉시 확인 필요*\n_보고: Paul (Head of Reach) → #studio_\n\n• 커밋: \`${COMMIT_MSG}\`\n• Actions: https://github.com/blessu76/studio-rest/actions/runs/${{ github.run_id }}\",
              \"mrkdwn\": true
            }"
